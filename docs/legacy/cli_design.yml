uesf:
  raw:  # Manage raw dataset.
    pass
  preprocessed:  # Manage preprocessed dataset.
    pass
  project:  # Manage project.
    register:  # Register a new project based on project.yml in the current directory.
      OPTIONS:
        - --config <path>  # Path to the project configuration file.
        - --help  # Show help message and exit.
    list:  # List all registered projects.
      OPTIONS:
        - --help  # Show help message and exit.
    remove:  # Remove a registered project.
      OPTIONS:
        - --project-name <name>  # Name of the project to remove.
        - --help  # Show help message and exit.
    preprocess:  # Run preprocessing on raw datasets defined in the project.
      OPTIONS:
        - --help  # Show help message and exit.
    model:  # Manage models within the current project.
      OPTIONS:
        - --help  # Show help message and exit.
    experiment:  # Manage experiments within the current project. Alias: exp
      add:  # Add a new experiment.
        OPTIONS:
          - --help  # Show help message and exit. 
      OPTIONS:
        - --help  # Show help message and exit.
  set:  # Set global configuration.
    OPTIONS:
      - --data-dir <path>  # Set the data directory.
  OPTIONS:
    - --help  # Show help message and exit.
    - --version  # Print version information and quit.